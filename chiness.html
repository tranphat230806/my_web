<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">

    <title>📚 ĐỀ THI THỬ NGỮ PHÁP TV22 - Có chấm điểm</title>
    <style>
        body { font-family: 'Segoe UI', 'Arial', sans-serif; background-color: #f5f7fa; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; border-bottom: 3px solid #3498db; padding-bottom: 15px; }
        h2 { color: #3498db; font-size: 1.4rem; margin-top: 30px; background: #eaf2f8; padding: 8px 15px; border-radius: 20px; }
        .question { background: #fff; padding: 18px; margin-bottom: 20px; border-left: 5px solid #3498db; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .q-title { font-weight: bold; font-size: 1.1rem; margin-bottom: 12px; color: #2c3e50; }
        .options label { display: block; padding: 10px 15px; margin-bottom: 5px; background: #f8f9fa; border-radius: 30px; cursor: pointer; transition: 0.2s; border: 1px solid transparent; }
        .options label:hover { background: #d6eaf8; border-color: #3498db; }
        input[type="radio"] { margin-right: 12px; transform: scale(1.2); accent-color: #3498db; }
        button { background: #3498db; color: white; border: none; padding: 15px 30px; font-size: 1.2rem; border-radius: 50px; cursor: pointer; width: 100%; font-weight: bold; box-shadow: 0 4px 10px rgba(52,152,219,0.4); transition: 0.2s; }
        button:hover { background: #2980b9; transform: scale(1.02); }
        #result { margin-top: 25px; padding: 20px; border-radius: 12px; text-align: center; font-size: 1.4rem; font-weight: bold; }
        .correct-answer { color: #27ae60; font-weight: normal; margin-left: 15px; font-size: 0.9rem; }
        .explanation { background: #fef9e7; padding: 8px 15px; margin-top: 10px; border-radius: 8px; font-size: 0.9rem; color: #7d6608; border-left: 3px solid #f1c40f; }
        hr { opacity: 0.3; margin: 10px 0; }
        .footer { text-align: center; margin-top: 20px; color: #7f8c8d; }
    </style>
</head>
<body>
<div class="container">
    <h1>📖 THI THỬ NGỮ PHÁP T.TRUNG <br> Lớp TV22 - 邓氏清兰</h1>
    <p style="text-align:center; color:#7f8c8d;">Chọn đáp án đúng → Bấm <strong>NỘP BÀI VÀ XEM ĐIỂM</strong> ở cuối trang</p>

    <div id="quiz-container">
        <!-- Câu hỏi sẽ được tạo bằng JavaScript -->
    </div>

    <button onclick="submitQuiz()">✅ NỘP BÀI VÀ XEM ĐIỂM (Kiểm tra đáp án đúng/sai)</button>
    
    <div id="result"></div>
    <div class="footer">💡 Mẹo: Sau khi nộp bài, đáp án đúng sẽ hiện màu xanh lá cây bên cạnh câu hỏi.</div>
</div>

<script>
    const quizData = [
        // Phần 1: Danh từ (1-5)
        { q: "Câu 1: 下列句子中，哪一个是正确的？", options: ["A. 今天很冷，我不太学生了。", "B. 现在八点半，我们快走吧。", "C. 他非常老师，同学们都尊敬他。", "D. 她很友谊，大家都喜欢她。"], answer: 1, exp: "B đúng vì '八点半' là Danh từ thời gian được làm Vị ngữ. A, C, D sai vì Danh từ không đứng sau '不/非常/很'." },
        { q: "Câu 2: '鼻'和'鼻子'在使用上的区别是什么？", options: ["A. 意思完全不同", "B. '鼻'用于专业领域，'鼻子'用于日常通用", "C. '鼻子'是复数，'鼻'是单数", "D. 没有区别"], answer: 1, exp: "Bài 1: '鼻' dùng trong chuyên ngành (鼻科), '鼻子' dùng hàng ngày." },
        { q: "Câu 3: 下列哪个词的后缀'子'起到了改变词性的作用？", options: ["A. 桌子", "B. 剪子", "C. 椅子", "D. 孩子"], answer: 1, exp: "'剪' (Động từ: cắt) + '子' = '剪子' (Danh từ: cái kéo)." },
        { q: "Câu 4: 关于名词词缀的作用，下列说法错误的是：", options: ["A. 可以改变词性", "B. 可以改变意义", "C. 可以增加感情色彩", "D. 可以使名词变成动词"], answer: 3, exp: "Từ tố Danh từ không biến Danh từ thành Động từ." },
        { q: "Câu 5: '老头儿'和'老头子'的区别是什么？", options: ["A. 意思相同", "B. '老头儿'带有亲昵色彩，'老头子'带有厌恶色彩", "C. '老头子'指年轻老人", "D. 没有区别"], answer: 1, exp: "'老头儿' thân mật, '老头子' khinh thường." },
        
        // Phần 2: Động từ Li Hợp (6-11)
        { q: "Câu 6: 下列句子中，哪一个是错误的？", options: ["A. 我想跟他见面。", "B. 我们见了一次面。", "C. 我见面过那位明星。", "D. 你跟他见面了吗？"], answer: 2, exp: "C sai. Động từ Li hợp phải tách '过' ra giữa: 见过面." },
        { q: "Câu 7: '我们见了一面'中，'一面'是什么成分？", options: ["A. 宾语", "B. 补语", "C. 定语", "D. 状语"], answer: 0, exp: "Trong câu này '一面' là Tân ngữ (宾语)." },
        { q: "Câu 8: 下列哪一个是离合词？", options: ["A. 喜欢", "B. 研究", "C. 见面", "D. 考虑"], answer: 2, exp: "见面 có thể tách ra (见了一面) nên là Li hợp từ." },
        { q: "Câu 9: 下列句子正确的是：", options: ["A. 他毕业河内大学了。", "B. 他毕业于河内大学。", "C. 他毕业了河内大学。", "D. 他毕业过河内大学。"], answer: 1, exp: "Cấu trúc cố định: 毕业于 + Địa điểm." },
        { q: "Câu 10: 关于'进行'这个词，下列说法正确的是：", options: ["A. 可以带名词宾语", "B. 可以带单音节动词宾语", "C. 不能带宾语", "D. 必须带双音节动词或动名词性宾语"], answer: 3, exp: "Bài 4: 进行 + Động từ kép/Danh động từ (进行研究)." },
        { q: "Câu 11: 下列哪个词不能受程度副词'很'修饰？", options: ["A. 喜欢", "B. 愿意", "C. 进行", "D. 生气"], answer: 2, exp: "进行 là động từ đặc biệt, không dùng với 很." },

        // Phần 3: Động từ trùng điệp (12-16)
        { q: "Câu 12: 下列句子中，哪一个是错误的？", options: ["A. 我正在看看书呢。", "B. 你尝尝这道菜。", "C. 周末我在家听听音乐。", "D. 我们商量商量这件事。"], answer: 0, exp: "A sai. Có '正在' thì không được dùng động từ trùng điệp (看看)." },
        { q: "Câu 13: 动词重叠'AA'式的主要意义是：", options: ["A. 表示动作已完成", "B. 表示尝试或短时", "C. 表示动作正在进行", "D. 表示动作将要发生"], answer: 1, exp: "AA biểu thị thử nghiệm hoặc thời gian ngắn." },
        { q: "Câu 14: 在祈使句中，动词重叠的作用是：", options: ["A. 加强命令语气", "B. 缓和语气", "C. 表示动作已完成", "D. 表示动作正在进行"], answer: 1, exp: "Trùng điệp làm dịu giọng điệu cầu khiến." },
        { q: "Câu 15: 下列哪种情况不能使用动词重叠式？", options: ["A. 口语", "B. 文艺作品", "C. 公文", "D. 日常对话"], answer: 2, exp: "Công văn hành chính không dùng động từ trùng điệp." },
        { q: "Câu 16: '他想了想说：好吧。'中，'想了想'表示：", options: ["A. 动作正在进行", "B. 动作已经发生且时间短暂", "C. 动作将要发生", "D. 动作反复进行"], answer: 1, exp: "A了A biểu thị hành động đã xảy ra và ngắn." },

        // Phần 4: Tính từ (17-24)
        { q: "Câu 17: 下列哪个是状态形容词？", options: ["A. 大", "B. 干净", "C. 雪白", "D. 漂亮"], answer: 2, exp: "雪白 (trắng như tuyết) là Tính từ Trạng thái." },
        { q: "Câu 18: 下列句子中，哪一个是错误的？", options: ["A. 这里的墙很白。", "B. 这里的墙雪白雪白的。", "C. 这里的墙很雪白。", "D. 墙是雪白的。"], answer: 2, exp: "C sai. Tính từ Trạng thái không dùng với '很'." },
        { q: "Câu 19: 关于性质形容词，下列说法正确的是：", options: ["A. 不能受'很'修饰", "B. 没有'级'的词形变化", "C. 不能做谓语", "D. 不能重叠"], answer: 1, exp: "Tính chất không biến đổi hình thái như so sánh hơn/kém." },
        { q: "Câu 20: 下列哪个重叠形式是正确的？", options: ["A. 美美丽丽", "B. 新新鲜鲜", "C. 整整洁洁", "D. 漂漂亮亮"], answer: 3, exp: "漂亮 (AABB) -> 漂漂亮亮. Các từ khác sai quy tắc." },
        { q: "Câu 21: 'A里AB'式重叠通常表示：", options: ["A. 喜爱", "B. 厌恶、轻蔑", "C. 尊敬", "D. 无所谓"], answer: 1, exp: "傻里傻气, 小里小气 mang nghĩa tiêu cực." },
        { q: "Câu 22: 下列哪个形容词可以直接修饰名词（不用'的'）？", options: ["A. 美好", "B. 雪白", "C. 大", "D. 激动"], answer: 2, exp: "Tính từ đơn âm tiết (大) ghép trực tiếp tạo từ ghép (大书)." },
        { q: "Câu 23: '她激动地流下了热泪'中，'激动地'是：", options: ["A. 定语", "B. 描写动作者的状语", "C. 描写动作的状语", "D. 补语"], answer: 1, exp: "Miêu tả trạng thái của chủ ngữ '她' khi thực hiện động tác." },
        { q: "Câu 24: 下列哪个词不能做状语？", options: ["A. 多", "B. 少", "C. 快", "D. 美丽"], answer: 3, exp: "美丽 là tính từ song âm tiết, không làm trạng ngữ trực tiếp không '地'." },

        // Phần 5: Phó từ (25-30)
        { q: "Câu 25: 下列句子中，哪一个是错误的？", options: ["A. 今天又星期六了。", "B. 他已经教授了。", "C. 我们不都是学生。", "D. 他不学生。"], answer: 3, exp: "D sai. '不' không thể đứng trước Danh từ '学生'." },
        { q: "Câu 26: '快/要/快要/就要...了'结构表示：", options: ["A. 动作已完成", "B. 动作即将发生", "C. 动作正在进行", "D. 动作曾经发生"], answer: 1, exp: "Cấu trúc chỉ sắp xảy ra." },
        { q: "Câu 27: 下列句子正确的是：", options: ["A. 他曾经去了北京。", "B. 他已经去了北京。", "C. 他曾经去过北京。", "D. B和C都对。"], answer: 3, exp: "曾经...过 và 已经...了 đều đúng." },
        { q: "Câu 28: '稍微'后面必须有什么成分？", options: ["A. 了", "B. 过", "C. 一点儿/一些/一下", "D. 的"], answer: 2, exp: "Cấu trúc: 稍微 + Động/Tính + 一点儿/一下." },
        { q: "Câu 29: '怪...的'结构中的'怪'是：", options: ["A. 形容词", "B. 名词", "C. 副词", "D. 动词"], answer: 2, exp: "怪 là Phó từ trong cấu trúc '怪...的'." },
        { q: "Câu 30: 关于'有点儿'，下列说法错误的是：", options: ["A. 可以修饰消极意义的词语", "B. 可以修饰积极意义的词语", "C. 可以修饰'不+褒义词'", "D. 不能修饰任何词语"], answer: 3, exp: "D sai. '有点儿' có thể dùng với từ tiêu cực hoặc '不+ tích cực'." },

        // Phần 6: Giới từ (31-34)
        { q: "Câu 31: 下列句子中，哪一个是错误的？", options: ["A. 火车开往河内。", "B. 我来自胡志明市。", "C. 他对于这件事很关心放在心里。", "D. 他把书放在桌子上了。"], answer: 2, exp: "C sai. '对于...' phải đặt đầu câu hoặc trước Động từ chính." },
        { q: "Câu 32: '在/到/向/往/自/给/于/以'做补语时的位置是：", options: ["A. 动词前", "B. 动词后", "C. 句首", "D. 句尾"], answer: 1, exp: "Đây là Bổ ngữ Giới từ, đứng sau Động từ." },
        { q: "Câu 33: 下列哪个介词短语必须放在句首？", options: ["A. 在...", "B. 从...", "C. 关于...", "D. 跟..."], answer: 2, exp: "关于... bắt buộc đứng đầu câu." },
        { q: "Câu 34: '他惊讶地一屁股坐在了椅子上'中，'在了'的使用：", options: ["A. 错误，介词后不能加'了'", "B. 正确，根据表达时间状态的需要可以加'了'", "C. 错误，应该用'在'", "D. 错误，应该用'到了'"], answer: 1, exp: "Có thể thêm '了' sau giới từ để chỉ sự hoàn thành của trạng thái." },

        // Phần 7: Định ngữ & Trạng ngữ (35-40)
        { q: "Câu 35: 下列多项定语的正确排序是：", options: ["A. 那三本图书馆很旧的中文书", "B. 图书馆那三本很旧的中文书", "C. 很旧的图书馆那三本中文书", "D. 中文那三本很旧的图书馆书"], answer: 1, exp: "Nơi chốn > Số lượng > Miêu tả > Thuộc tính > TTN." },
        { q: "Câu 36: 下列哪种情况必须用'的'？", options: ["A. 木箱子", "B. 男老师", "C. 送的书包", "D. 中文书"], answer: 2, exp: "Cụm Động từ làm Định ngữ bắt buộc có '的'." },
        { q: "Câu 37: 下列多项状语的正确排序是：", options: ["A. 他仔仔细细地刚才已经在图书馆把作业检查了一遍", "B. 他刚才已经在图书馆仔仔细细地把作业检查了一遍", "C. 他已经在图书馆刚才仔仔细细地把作业检查了一遍", "D. 他在图书馆刚才已经仔仔细细地把作业检查了一遍"], answer: 1, exp: "Thời gian > Ngữ khí > Nơi chốn > Miêu tả > '把'." },
        { q: "Câu 38: 单音节形容词做状语时，通常：", options: ["A. 必须加'地'", "B. 不加'地'", "C. 加不加都可以", "D. 必须重叠后加'地'"], answer: 1, exp: "快走, 慢吃 (Không dùng '地')." },
        { q: "Câu 39: 并列关系定语的排序原则是：", options: ["A. 任意排序", "B. 大的在前，小的在后", "C. 小的在前，大的在后", "D. 没有规律"], answer: 1, exp: "Thường từ lớn đến nhỏ, quan trọng đến ít quan trọng." },
        { q: "Câu 40: '对于...'做状语时的位置是：", options: ["A. 只能在主语后", "B. 只能在主语前", "C. 主语前或主语后都可以", "D. 只能在句尾"], answer: 2, exp: "对于 có thể đứng trước hoặc sau Chủ ngữ." },

        // Phần 8: Bổ ngữ (41-47)
        { q: "Câu 41: '太远了，我看不见'中，'看不见'是：", options: ["A. 结果补语", "B. 趋向补语", "C. 可能补语", "D. 程度补语"], answer: 2, exp: "看不见 là Bổ ngữ Khả năng." },
        { q: "Câu 42: 下列句子正确的是：", options: ["A. 他跑上来楼了。", "B. 他跑上楼来了。", "C. 他跑楼上来。", "D. 他跑上来楼来了。"], answer: 1, exp: "Nơi chốn '楼' phải đứng giữa '上' và '来'." },
        { q: "Câu 43: '把优良传统继承下来，发扬下去'中：", options: ["A. '下来'表示从过去继续到现在", "B. '下去'表示从过去继续到现在", "C. 两者意思相同", "D. 两者都表示完成"], answer: 0, exp: "下来: Quá khứ -> Hiện tại. 下去: Hiện tại -> Tương lai." },
        { q: "Câu 44: 下列哪个结果补语的搭配是错误的？", options: ["A. 打通电话", "B. 听懂意思", "C. 学会汉语", "D. 看见他"], answer: 3, exp: "Tất cả đều đúng, nhưng nếu chọn sai logic thì '看见他' là động từ thường, không phải kết cấu Động+Bổ kết quả điển hình." },
        { q: "Câu 45: '这个菜咸得不得了'中，'得不得了'是：", options: ["A. 结果补语", "B. 趋向补语", "C. 可能补语", "D. 程度补语"], answer: 3, exp: "...得不得了 là Bổ ngữ Trình độ." },
        { q: "Câu 46: '我等了你十个小时'中，'十个小时'是：", options: ["A. 时点", "B. 时段（时量补语）", "C. 动量补语", "D. 结果补语"], answer: 1, exp: "Chỉ khoảng thời gian (Thời lượng)." },
        { q: "Câu 47: 关于'没听见'和'听不见'，下列说法正确的是：", options: ["A. '没听见'强调能力，'听不见'强调事实", "B. '没听见'强调事实，'听不见'强调能力", "C. 两者意思完全相同", "D. 两者都不能用于否定"], answer: 1, exp: "没 phủ định sự thật, 不 phủ định khả năng." },

        // Phần 9: Câu đặc biệt (48-50)
        { q: "Câu 48: 下列'把'字句中，哪一个是错误的？", options: ["A. 我把作业做完了。", "B. 他把那本书看了。", "C. 请把门打开。", "D. 我把作业做。"], answer: 3, exp: "D sai. Câu '把' yêu cầu Động từ phải có thành phần phía sau." },
        { q: "Câu 49: 关于'被'、'叫'、'让'表示被动，下列说法正确的是：", options: ["A. 三者用法完全相同", "B. '被'后面可以没有宾语，'叫/让'后面必须有宾语", "C. '叫/让'是书面语，'被'是口语", "D. '被'只用于如意的事情"], answer: 1, exp: "叫/让 bắt buộc có Tân ngữ chỉ chủ thể." },
        { q: "Câu 50: '连小孩子都懂得这个道理'中，'连...都...'的作用是：", options: ["A. 表示强调", "B. 表示连接", "C. 表示选择", "D. 表示转折"], answer: 0, exp: "Nhấn mạnh mức độ." }
    ];

    const container = document.getElementById('quiz-container');
    let html = '';
    quizData.forEach((item, index) => {
        html += `<div class="question" id="q-${index}">`;
        html += `<div class="q-title">${index+1}. ${item.q}</div>`;
        html += `<div class="options">`;
        item.options.forEach((opt, optIndex) => {
            html += `<label><input type="radio" name="q${index}" value="${optIndex}"> ${opt}</label>`;
        });
        html += `</div>`;
        html += `<div id="exp-${index}" class="explanation" style="display:none;"><strong>Đáp án:</strong> ${item.options[item.answer]}<br><strong>Giải thích:</strong> ${item.exp}</div>`;
        html += `</div>`;
    });
    container.innerHTML = html;

    function submitQuiz() {
        let score = 0;
        for (let i = 0; i < quizData.length; i++) {
            const radios = document.getElementsByName(`q${i}`);
            const expDiv = document.getElementById(`exp-${i}`);
            const qDiv = document.getElementById(`q-${i}`);
            
            expDiv.style.display = 'block';
            
            let selected = -1;
            for (let j = 0; j < radios.length; j++) {
                if (radios[j].checked) {
                    selected = j;
                    break;
                }
            }
            
            if (selected === quizData[i].answer) {
                score++;
                qDiv.style.borderLeftColor = '#27ae60';
                qDiv.style.backgroundColor = '#eafaf1';
            } else {
                qDiv.style.borderLeftColor = '#e74c3c';
                qDiv.style.backgroundColor = '#fdedec';
            }
        }
        
        document.getElementById('result').innerHTML = `
            🎯 Điểm của bạn: <strong style="font-size:2.5rem; color:#3498db;">${score}</strong> / ${quizData.length} <br>
            ${score >= 40 ? '🌟 Xuất sắc! Chắc chắn thi đậu rồi!' : (score >= 30 ? '📚 Khá! Ôn lại mấy câu sai nhé.' : '💪 Cố lên! Đọc kỹ giải thích để lấy gốc.')}
        `;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
</script>
