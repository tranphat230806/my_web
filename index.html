    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(145deg, #1a3c2c 0%, #0e2a1e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .game-container {
            max-width: 600px;
            width: 100%;
            background: #fffef7;
            border-radius: 56px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.4);
            overflow: hidden;
            padding: 20px 20px 30px;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 1.7rem;
            color: #d64b2c;
            letter-spacing: -0.5px;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            background: #f0eee4;
            padding: 12px 20px;
            border-radius: 60px;
            margin: 12px 0;
            font-weight: bold;
        }

        .score, .q-count {
            background: #2e5a3a;
            color: white;
            padding: 4px 16px;
            border-radius: 40px;
            font-size: 1rem;
        }

        .question-card {
            background: #ffffff;
            border-radius: 48px;
            padding: 32px 16px;
            margin: 16px 0;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            border: 1px solid #f0dbb2;
            text-align: center;
        }

        .chinese-word {
            font-size: 2.5rem;
            font-weight: 700;
            color: #2c4b35;
            letter-spacing: 2px;
            word-break: break-word;
        }

        .pinyin {
            font-size: 1.2rem;
            color: #b86f2c;
            margin-top: 12px;
            font-family: monospace;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 20px 0;
        }

        .opt-btn {
            background: #f9f7ef;
            border: 2px solid #e2d8bd;
            border-radius: 100px;
            padding: 14px 20px;
            font-size: 1rem;
            text-align: left;
            font-weight: 500;
            color: #2d3e2b;
            transition: all 0.1s ease;
            cursor: pointer;
            font-family: inherit;
        }

        .opt-btn:hover {
            background: #f0ebda;
        }

        .correct {
            background: #9bdd9b;
            border-color: #2e7d32;
            color: #1a4a1a;
            pointer-events: none;
        }

        .wrong {
            background: #f3b5b5;
            border-color: #c7362b;
            color: #7a2e1a;
            pointer-events: none;
            text-decoration: line-through;
        }

        .disabled-opt {
            pointer-events: none;
            opacity: 0.7;
        }

        .feedback {
            text-align: center;
            font-size: 1.1rem;
            font-weight: bold;
            padding: 12px;
            border-radius: 60px;
            margin: 12px 0;
        }

        .next-btn {
            background: #d64b2c;
            color: white;
            border: none;
            border-radius: 60px;
            padding: 16px;
            font-size: 1.2rem;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            margin-top: 8px;
            transition: 0.2s;
        }

        .next-btn:active {
            transform: scale(0.97);
            background: #b03a1f;
        }

        .restart-btn {
            background: #3f6b4c;
            margin-top: 12px;
        }

        .result {
            text-align: center;
            background: #f1f8e9;
            border-radius: 48px;
            padding: 24px;
            margin-top: 20px;
        }

        .hide {
            display: none;
        }

        footer {
            font-size: 0.7rem;
            text-align: center;
            color: #998f70;
            margin-top: 20px;
        }
    </style>
</head>

    // --------------------------------------------------------------
    // Ứng dụng game
    // --------------------------------------------------------------
    let currentQuestions = [];
    let currentQIndex = 0;
    let currentScore = 0;
    let locked = false;

    const quizPanel = document.getElementById('quizPanel');
    const resultPanel = document.getElementById('resultPanel');
    const chineseText = document.getElementById('chineseText');
    const pinyinText = document.getElementById('pinyinText');
    const optionsDiv = document.getElementById('optionsContainer');
    const feedbackDiv = document.getElementById('feedbackMsg');
    const nextBtn = document.getElementById('nextBtn');
    const restartBtn = document.getElementById('restartBtn');
    const restartResultBtn = document.getElementById('restartResultBtn');
    const scoreSpanUI = document.getElementById('scoreValue');
    const currentIdxSpan = document.getElementById('currentIdx');
    const totalSpan = document.getElementById('totalCount');

    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function initGame() {
        // lấy toàn bộ từ vựng, xào thứ tự
        currentQuestions = shuffleArray([...vocabulary]);
        currentQIndex = 0;
        currentScore = 0;
        locked = false;
        updateScoreUI();
        totalSpan.innerText = currentQuestions.length;
        currentIdxSpan.innerText = "1";
        quizPanel.classList.remove('hide');
        resultPanel.classList.add('hide');
        renderQuestion();
    }

    function renderQuestion() {
        if (currentQIndex >= currentQuestions.length) {
            endGame();
            return;
        }
        locked = false;
        const q = currentQuestions[currentQIndex];
        chineseText.innerText = q.word;
        pinyinText.innerText = q.pinyin;

        // Tạo 4 đáp án: 1 đúng + 3 random khác (có thể lấy từ vocabulary khác)
        let meaningPool = vocabulary.map(v => v.meaning).filter(m => m !== q.meaning);
        meaningPool = [...new Set(meaningPool)]; // bỏ trùng
        let wrongOptions = [];
        while (wrongOptions.length < 3 && meaningPool.length > 0) {
            const rand = meaningPool[Math.floor(Math.random() * meaningPool.length)];
            if (!wrongOptions.includes(rand) && rand !== q.meaning) {
                wrongOptions.push(rand);
            }
            if (meaningPool.length < 3) break;
        }
        // nếu không đủ 3 wrong thì bổ sung tạm
        while (wrongOptions.length < 3) {
            wrongOptions.push("(từ khác)");
        }
        let options = [q.meaning, ...wrongOptions];
        options = shuffleArray(options);

        // render các nút
        optionsDiv.innerHTML = '';
        const letters = ['A', 'B', 'C', 'D'];
        options.forEach((opt, idx) => {
            const btn = document.createElement('div');
            btn.className = 'opt-btn';
            btn.innerHTML = `<span class="opt-prefix">${letters[idx]}</span><span class="opt-text">${opt}</span>`;
            btn.onclick = () => checkAnswer(opt, q.meaning, btn);
            optionsDiv.appendChild(btn);
        });
        feedbackDiv.innerText = '';
    }

    function checkAnswer(selected, correctMeaning, btnElement) {
        if (locked) return;
        locked = true;
        const allBtns = document.querySelectorAll('.opt-btn');
        if (selected === correctMeaning) {
            // Đúng
            currentScore += 10;
            updateScoreUI();
            feedbackDiv.innerText = '✅ Đúng rồi! +10 điểm';
            feedbackDiv.style.color = '#2e7d32';
            btnElement.classList.add('correct');
            // highlight đáp án đúng nếu chưa highlight
            allBtns.forEach(btn => {
                const textSpan = btn.querySelector('.opt-text');
                if (textSpan && textSpan.innerText === correctMeaning) {
                    btn.classList.add('correct');
                }
            });
        } else {
            // Sai
            feedbackDiv.innerText = `❌ Sai rồi! Đáp án đúng là: ${correctMeaning}`;
            feedbackDiv.style.color = '#c7362b';
            btnElement.classList.add('wrong');
            allBtns.forEach(btn => {
                const textSpan = btn.querySelector('.opt-text');
                if (textSpan && textSpan.innerText === correctMeaning) {
                    btn.classList.add('correct');
                }
            });
        }
        // disable tất cả nút
        allBtns.forEach(btn => {
            btn.style.pointerEvents = 'none';
        });
    }

    function updateScoreUI() {
        scoreSpanUI.innerText = currentScore;
    }

    function nextQuestion() {
        if (!locked && currentQIndex < currentQuestions.length) {
            // chưa chọn đáp án -> không cho qua
            feedbackDiv.innerText = '⚠️ Hãy chọn một đáp án trước!';
            return;
        }
        currentQIndex++;
        if (currentQIndex < currentQuestions.length) {
            currentIdxSpan.innerText = currentQIndex + 1;
            renderQuestion();
        } else {
            endGame();
        }
    }

    function endGame() {
        quizPanel.classList.add('hide');
        resultPanel.classList.remove('hide');
        const percent = Math.round((currentScore / (currentQuestions.length * 10)) * 100);
        document.getElementById('finalScoreMsg').innerHTML = `Bạn đã trả lời ${currentQuestions.length} câu.<br>🏆 Điểm số: ${currentScore} / ${currentQuestions.length * 10}<br>📊 Tỉ lệ đúng: ${percent}%`;
    }

    function restartGame() {
        initGame();
    }

    // sự kiện
    nextBtn.addEventListener('click', nextQuestion);
    restartBtn.addEventListener('click', restartGame);
    restartResultBtn.addEventListener('click', restartGame);

    // start
    initGame();
</script>
