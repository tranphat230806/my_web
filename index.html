<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Luyện từ vựng - Đọc báo tiếng Trung</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', 'Poppins', 'Noto Sans', system-ui, -apple-system, 'Roboto', sans-serif;
            background: linear-gradient(135deg, #1a5f7a 0%, #0e3e52 100%);
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            max-width: 750px;
            width: 100%;
            background: #fffef7;
            border-radius: 56px;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 215, 150, 0.3);
            overflow: hidden;
            transition: all 0.2s ease;
        }

        .game-header {
            background: linear-gradient(145deg, #d4451c, #b1320e);
            padding: 20px 25px;
            color: white;
            text-align: center;
        }

        .game-header h1 {
            margin: 0;
            font-size: 1.6rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-top: 14px;
            background: #9e2a1c70;
            padding: 8px 18px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1rem;
        }

        .question-card {
            padding: 30px 25px 20px;
            text-align: center;
        }

        .chinese-word {
            font-size: 2.8rem;
            font-weight: 700;
            background: #fef1e4;
            padding: 30px 15px;
            border-radius: 48px;
            box-shadow: inset 0 1px 4px #0001, 0 12px 18px -8px rgba(0,0,0,0.1);
            margin-bottom: 8px;
            color: #3e2a1f;
            letter-spacing: 2px;
        }

        .pinyin-badge {
            font-size: 1.2rem;
            background: #e6d5c0;
            display: inline-block;
            padding: 8px 24px;
            border-radius: 40px;
            margin: 12px 0 20px;
            color: #b04524;
            font-weight: 500;
            letter-spacing: 1px;
            box-shadow: inset 0 0 0 1px #fff8, 0 2px 6px #0001;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 25px;
            padding: 0 6px;
        }

        .option-btn {
            background: white;
            border: 2px solid #f0d5b6;
            border-radius: 100px;
            padding: 14px 8px;
            font-size: 1rem;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            color: #2d2b26;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        .option-btn:hover:not(:disabled) {
            background: #fff3e8;
            transform: scale(0.97);
            border-color: #d68b5a;
        }

        .feedback-area {
            text-align: center;
            padding: 12px 20px 20px;
        }

        .message {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 20px;
            padding: 12px;
            border-radius: 60px;
            background: #f3ede5;
            display: inline-block;
            width: 100%;
        }

        .message.correct {
            background: #cbe6cf;
            color: #1f5a2e;
        }

        .message.wrong {
            background: #ffe0db;
            color: #bc3f2c;
        }

        .next-btn {
            background: #2b6e4f;
            color: white;
            border: none;
            padding: 12px 32px;
            font-size: 1.15rem;
            font-weight: bold;
            border-radius: 60px;
            width: 80%;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            margin-top: 8px;
        }

        .next-btn:active {
            transform: scale(0.96);
        }

        .reset-btn {
            background: #ca744a;
            margin-top: 12px;
            width: 50%;
        }

        .score-progress {
            background: #f1e7dc;
            padding: 14px;
            text-align: center;
            font-weight: 600;
            border-top: 1px solid #eedbc8;
            color: #5c3e2b;
            font-size: 1rem;
        }

        @media (max-width: 550px) {
            .chinese-word { font-size: 2rem; padding: 20px; }
            .pinyin-badge { font-size: 0.9rem; padding: 5px 16px; }
            .options-grid { gap: 10px; }
            .option-btn { font-size: 0.85rem; padding: 12px 6px; }
        }
    </style>
</head>

        { word: "抵制", pinyin: "dǐzhì", meaning: "Tẩy chay" },

        { word: "召开", pinyin: "zhàokāi", meaning: "Triệu tập" },
        { word: "融合", pinyin: "rónghé", meaning: "Dung hợp" },

        { word: "淘汰", pinyin: "táotài", meaning: "Đào thải" },
        { word: "死亡", pinyin: "sǐwáng", meaning: "Tử vong" }

    // Xáo trộn mảng
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    let gameWords = [];
    let currentIndex = 0;
    let correctCount = 0;
    let isAnswered = false;
    let currentOptions = [];

    // DOM
    const questionWordEl = document.getElementById("questionWord");
    const pinyinDisplay = document.getElementById("pinyinDisplay");
    const optionsContainer = document.getElementById("optionsContainer");
    const feedbackMsg = document.getElementById("feedbackMsg");
    const nextBtn = document.getElementById("nextBtn");
    const resetBtn = document.getElementById("resetBtn");
    const currentIdxSpan = document.getElementById("currentIdx");
    const totalCountSpan = document.getElementById("totalCount");
    const correctCountSpan = document.getElementById("correctCount");
    const scoreTextDiv = document.getElementById("scoreText");

    // Lấy 3 nghĩa sai khác
    function getRandomWrongMeanings(correctMeaning, currentWordIdx) {
        let candidates = [];
        for (let i = 0; i < gameWords.length; i++) {
            if (i !== currentWordIdx && gameWords[i].meaning !== correctMeaning) {
                candidates.push(gameWords[i].meaning);
            }
        }
        let unique = [...new Set(candidates)];
        while (unique.length < 3) unique.push("Từ mới");
        for (let i = unique.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [unique[i], unique[j]] = [unique[j], unique[i]];
        }
        return unique.slice(0, 3);
    }

    function generateOptions(wordObj, idx) {
        const correct = wordObj.meaning;
        const wrongs = getRandomWrongMeanings(correct, idx);
        let opts = [correct, ...wrongs];
        for (let i = opts.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [opts[i], opts[j]] = [opts[j], opts[i]];
        }
        return opts;
    }

    function renderQuestion() {
        if (!gameWords.length) return;
        const current = gameWords[currentIndex];
        questionWordEl.innerText = current.word;
        pinyinDisplay.innerText = current.pinyin;
        currentOptions = generateOptions(current, currentIndex);
        
        const btns = optionsContainer.querySelectorAll(".option-btn");
        btns.forEach((btn, i) => {
            btn.innerText = `${String.fromCharCode(65+i)}. ${currentOptions[i]}`;
            btn.style.background = "white";
            btn.style.borderColor = "#f0d5b6";
            btn.disabled = false;
        });
        
        isAnswered = false;
        feedbackMsg.innerHTML = "📖 Chọn nghĩa tiếng Việt đúng!";
        feedbackMsg.className = "message";
        currentIdxSpan.innerText = currentIndex + 1;
        totalCountSpan.innerText = gameWords.length;
        correctCountSpan.innerText = correctCount;
        scoreTextDiv.innerHTML = `🏆 Đúng ${correctCount} / ${gameWords.length} từ`;
    }

    function handleAnswer(selectedIdx) {
        if (isAnswered) return;
        const selectedMeaning = currentOptions[selectedIdx];
        const currentWord = gameWords[currentIndex];
        const isCorrect = (selectedMeaning === currentWord.meaning);
        
        const btns = optionsContainer.querySelectorAll(".option-btn");
        if (isCorrect) {
            correctCount++;
            feedbackMsg.innerHTML = "✅ Chính xác! +1 điểm";
            feedbackMsg.className = "message correct";
            btns.forEach(btn => {
                if (btn.innerText.substring(3) === currentWord.meaning) {
                    btn.style.background = "#b7e0b0";
                    btn.style.borderColor = "#2b6e4f";
                }
            });
        } else {
            feedbackMsg.innerHTML = `❌ Sai. Đáp án đúng: "${currentWord.meaning}"`;
            feedbackMsg.className = "message wrong";
            btns.forEach(btn => {
                if (btn.innerText.substring(3) === currentWord.meaning) {
                    btn.style.background = "#b7e0b0";
                    btn.style.borderColor = "#2b6e4f";
                }
                if (btn === btns[selectedIdx]) {
                    btn.style.background = "#f4bc9a";
                    btn.style.borderColor = "#bc3f2c";
                }
            });
        }
        correctCountSpan.innerText = correctCount;
        scoreTextDiv.innerHTML = `📚 Đúng ${correctCount} / ${gameWords.length}`;
        isAnswered = true;
        btns.forEach(btn => btn.disabled = true);
    }

    function nextQuestion() {
        if (!isAnswered && currentIndex < gameWords.length - 1) {
            feedbackMsg.innerHTML = "⚠️ Hãy trả lời trước khi chuyển câu!";
            return;
        }
        if (currentIndex + 1 < gameWords.length) {
            currentIndex++;
            renderQuestion();
        } else {
            if (isAnswered || gameWords.length === 0) {
                feedbackMsg.innerHTML = "🎉 HOÀN THÀNH! Nhấn 'Học lại' để tiếp tục.";
                feedbackMsg.className = "message correct";
                nextBtn.disabled = true;
            } else {
                feedbackMsg.innerHTML = "🔔 Cần trả lời câu cuối cùng trước!";
            }
        }
    }

    function resetGame() {
        gameWords = shuffleArray([...vocabulary]);
        currentIndex = 0;
        correctCount = 0;
        isAnswered = false;
        nextBtn.disabled = false;
        renderQuestion();
    }

    function bindEvents() {
        const btns = optionsContainer.querySelectorAll(".option-btn");
        btns.forEach((btn, idx) => {
            btn.addEventListener("click", () => handleAnswer(idx));
        });
        nextBtn.addEventListener("click", nextQuestion);
        resetBtn.addEventListener("click", resetGame);
    }

    function init() {
        gameWords = shuffleArray([...vocabulary]);
        totalCountSpan.innerText = gameWords.length;
        bindEvents();
        renderQuestion();
    }

    init();
</script>
